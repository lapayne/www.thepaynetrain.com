name: PR Preview + Tests

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  test_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      # Run tests against localhost
      - name: Start local server
        run: npm run dev &

      - name: Wait for local server
        run: npx wait-on http://localhost:3000

      - name: Run full Playwright suite (local)
        run: npx playwright test --project=local
        env:
          BASE_URL: http://localhost:3000

      # Deploy preview
      - name: Deploy Firebase Preview
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEPAYNETRAIN_COM }}
          projectId: thepaynetrain-com
          expires: 5d
          channelId: pr-${{ github.event.number }}

      # Wait for preview
      - name: Wait for preview deployment
        run: npx wait-on $BASE_URL
        env:
          BASE_URL: ${{ steps.deploy.outputs.details_url }}

      # Run smoke tests against deployed preview
      - name: Run preview smoke tests
        run: npx playwright test --project=preview
        env:
          BASE_URL: ${{ steps.deploy.outputs.details_url }}

      # Upload traces for debugging
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
